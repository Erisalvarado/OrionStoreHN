<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <h2>Orion Store User</h2>
        <p>Introduzca sus datos para iniciar sesión..</p>
        
        <form action="/login-endpoint" method="POST">
            <div class="input-group">
                <label for="email">Correo Electronico</label>
                <input type="email" id="email" name="email" required placeholder="you@example.com">
            </div>
            
            <div class="input-group">
                <div class="password-label-row">
                    <label for="password">Contraseña</label>
                    <a href="#" class="forgot-password">¿Olvidó?</a>
                </div>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>
            
            <div class="remember-me">
                <input type="checkbox" id="remember" name="remember">
                <label for="remember">Acuérdate de mí durante 30 días.</label>
            </div>
            
            <button type="submit" class="btn-submit">Iniciar sesión</button>
        </form>
        
        <div class="login-footer">
            <p>¿No tienes una cuenta? <a href="#">Inscribirse</a></p>
        </div>
    </div>
</body>
</html>
