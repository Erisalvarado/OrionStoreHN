<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cesta Orion Store </title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 40px;
            background-color: #f9f9fb;
            color: #333;
        }
        h2 {
            color: #2c3e50;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #edf2f7;
        }
        th {
            background-color: #e66815;
            color: white;
            font-weight: 600;
        }
        input[type="number"] {
            width: 70px;
            padding: 6px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            font-size: 14px;
        }
        .total-row {
            font-weight: bold;
            font-size: 1.2em;
            background-color: #f8fafc;
        }
        .grand-total {
            color: #e66815;
        }
    </style>
</head>
<body>

    <h2>🛒 Cesta Orion Store </h2>
    <p>Modifica la cantidad o el precio de los productos para ver la actualización en tiempo real:</p>

    <table>
        <thead>
            <tr>
                <th>Producto</th>
                <th>Cantidad</th>
                <th>Precio Unitario ($)</th>
                <th>Total ($)</th>
            </tr>
        </thead>
        <tbody>
            <tr class="producto-fila">
                <td>Laptop Gamer</td>
                <td><input type="number" class="cantidad" value="1" min="0"></td>
                <td><input type="number" class="precio" value="1200" min="0" step="0.01"></td>
                <td class="total-producto">1200.00</td>
            </tr>
            <tr class="producto-fila">
                <td>Mouse Inalámbrico</td>
                <td><input type="number" class="cantidad" value="2" min="0"></td>
                <td><input type="number" class="precio" value="25" min="0" step="0.01"></td>
                <td class="total-producto">50.00</td>
            </tr>
            <tr class="producto-fila">
                <td>Teclado Mecánico</td>
                <td><input type="number" class="cantidad" value="1" min="0"></td>
                <td><input type="number" class="precio" value="80" min="0" step="0.01"></td>
                <td class="total-producto">80.00</td>
            </tr>
            <tr class="total-row">
                <td colspan="3" style="text-align: right;">Total a Pagar:</td>
                <td class="grand-total">$<span id="total-general">1330.00</span></td>
            </tr>
        </tbody>
    </table>

    <script>
        // Función principal que calcula los totales
        function calcularCarrito() {
            let totalGeneral = 0;
            
            // Obtenemos todas las filas de productos
            const filas = document.querySelectorAll('.producto-fila');
            
            filas.forEach(fila => {
                // Capturamos los inputs y el campo de total de cada fila
                const cantidadInput = fila.querySelector('.cantidad');
                const precioInput = fila.querySelector('.precio');
                const totalProductoTd = fila.querySelector('.total-producto');
                
                // Convertimos los valores a números (asegurando 0 si están vacíos)
                const cantidad = parseFloat(cantidadInput.value) || 0;
                const precio = parseFloat(precioInput.value) || 0;
                
                // Calculamos el subtotal de este producto
                const subtotal = cantidad * precio;
                
                // Mostramos el subtotal en la tabla con 2 decimales
                totalProductoTd.textContent = subtotal.toFixed(2);
                
                // Lo sumamos al total acumulado general
                totalGeneral += subtotal;
            });
            
            // Actualizamos el total general en la parte inferior
            document.getElementById('total-general').textContent = totalGeneral.toFixed(2);
        }

        // Escuchamos cualquier cambio en la tabla (tanto en cantidad como en precio)
        document.querySelector('table').addEventListener('input', calcularCarrito);
    </script>

</body>
</html>
